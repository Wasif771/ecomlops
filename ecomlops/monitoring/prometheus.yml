# EcoMLOps: Prometheus configuration for MLOps monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # ML API metrics
  - job_name: "ml-api"
    static_configs:
      - targets: ["ml-api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Custom metrics exporter
  - job_name: "metrics-exporter"
    static_configs:
      - targets: ["metrics-exporter:9100"]
    scrape_interval: 10s

  # MLflow metrics (if available)
  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow:5000"]
    scrape_interval: 30s
